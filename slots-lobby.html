<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Velvet Vault — Slots Lobby</title>
  <meta name="vv-protected" content="true">
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/pages/slots.css" />
  <link rel="stylesheet" href="css/pages/slots-lobby.css" />
  <script src="js/vv-security.js"></script>
</head>
<body class="vvTheme">
  <div id="vvBrandGlow" aria-hidden="true"></div>

  <div class="vvShell">
    <header class="vvTopbar">
      <div class="vvTopbarLeft">
        <a class="vvLogoLink" href="members.html" aria-label="Velvet Vault">
          <span class="vvLogo">VELVET VAULT</span>
          <span class="vvTag">Slots Lobby</span>
        </a>
      </div>
      <nav class="vvNav">
        <button class="vvHamburger" data-vv-hamburger type="button" aria-label="Open menu" aria-expanded="false" aria-controls="vvNavDrawer">
          <span></span><span></span><span></span>
        </button>
        <button id="btnLogout" class="vvNavItem vvNavDanger" type="button">Logout</button>
      </nav>
    </header>

    <main class="vvLobbyMain">
      <section class="vvLobbyHero">
        <div class="vvLobbyBreadcrumb">
          <a href="members.html">Members</a>
          <span>›</span>
          <span>Slots Lobby</span>
        </div>
        <h1 class="vvHeroTitle">Choose Your Velvet Grade</h1>
        <p>30 Velvet Grade cabinets — each with a distinct theme, layout, and feature set. Select any machine to launch instantly.</p>
      </section>

      <!-- ── Lobby Controls ──────────────────────────────────── -->
      <section class="vvLobbyControls" aria-label="Filter and sort machines">
        <div class="vvLobbyControlsRow">
          <label class="vvLobbySearchWrap" aria-label="Search machines">
            <span class="vvLobbySearchIcon" aria-hidden="true">&#9906;</span>
            <input
              id="vgSearch"
              class="vvLobbySearch"
              type="search"
              placeholder="Search machines…"
              autocomplete="off"
              spellcheck="false"
            />
          </label>

          <select id="vgFilterTheme" class="vvLobbySelect" aria-label="Filter by theme">
            <option value="">All Themes</option>
            <option value="noir">Noir</option>
            <option value="neon">Neon</option>
            <option value="gold">Gold</option>
            <option value="diamond">Diamond</option>
            <option value="crimson">Crimson</option>
          </select>

          <select id="vgFilterLayout" class="vvLobbySelect" aria-label="Filter by layout">
            <option value="">All Layouts</option>
            <option value="classic">Classic (5×3)</option>
            <option value="feature">Feature Expand / Contract</option>
          </select>

          <select id="vgSort" class="vvLobbySelect" aria-label="Sort machines">
            <option value="featured">Featured</option>
            <option value="az">A → Z</option>
            <option value="newest">Newest</option>
            <option value="theme">By Theme</option>
          </select>

          <label class="vvLobbyToggle" title="Show flagship machines only (VG-01 to VG-04)">
            <input id="vgFlagshipOnly" type="checkbox" />
            <span class="vvLobbyToggleTrack" aria-hidden="true"></span>
            <span class="vvLobbyToggleLabel">Flagship only</span>
          </label>

          <label class="vvLobbyToggle" title="Reduce animations for accessibility">
            <input id="vgReducedMotion" type="checkbox" />
            <span class="vvLobbyToggleTrack" aria-hidden="true"></span>
            <span class="vvLobbyToggleLabel">Reduced motion</span>
          </label>
        </div>

        <div id="vgResultCount" class="vvLobbyResultCount" aria-live="polite" aria-atomic="true"></div>
      </section>

      <section class="vvLobbyGridWrap">
        <div id="vgGrid" class="vv-slots-grid" aria-label="Velvet Grade machine tiles"></div>
      </section>
    </main>
  </div>

  <footer id="vv-footer"></footer>

  <script src="js/runtime-config.js"></script>
  <script type="module" src="js/firebase-init.js"></script>
  <script type="module" src="js/guard.js"></script>
  <script type="module" src="js/wallet.js"></script>
  <script src="js/story-engine.js"></script>
  <script src="js/story-progress.js"></script>
  <script type="module" src="js/vg/vg-registry.js"></script>
  <script type="module" src="js/vg/vg-lobby.js"></script>
  <script type="module" src="js/ui/footer.js"></script>
  <script src="js/vv-bg-particles.js" defer></script>
  <script type="module" src="js/ui/nav-drawer.js"></script>
</body>
</html>
